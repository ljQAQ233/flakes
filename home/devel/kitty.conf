confirm_os_window_close 0
background_opacity 0.85
copy_on_select yes
allow_remote_control yes

######### shortcuts ########
# refer to https://sw.kovidgoyal.net/kitty/actions/#mappable-actions

# disable unused shortcuts
map ctrl+shift+f1 none
map ctrl+shift+f2 none
map ctrl+shift+f5 none
map ctrl+shift+f6 none
map ctrl+shift+w none
map ctrl+shift+delete none

# the same as my suckless-terminal
map ctrl+shift+page_up change_font_size all +1.0
map ctrl+shift+page_down change_font_size all -1.0
map ctrl+shift+up scroll_page_up
map ctrl+shift+down scroll_page_down

